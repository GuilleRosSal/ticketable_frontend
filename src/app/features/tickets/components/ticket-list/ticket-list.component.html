@if (userRole$ | async; as role) {
  <div class="ticket-list">
    <div class="ticket-list__header">
      <h1 class="ticket-list__title">Lista de incidencias</h1>

      <div class="filter-button">
        <!-- TODO: add clicker event to open filters -->
        <p class="filter-button__text">Filtrar</p>
        <div class="filter-button__icon"></div>
      </div>

      <a
        class="open-ticket--desktop"
        [class.new-ticket--hidden]="role === 'CLIENT'"
        routerLink="/ticket/create"
        >+ Abrir incidencia</a
      >
    </div>

    <div class="ticket-list__list">
      @for (ticket of tickets$ | async; track ticket.ticket_id) {
        <app-ticket class="ticket-list__ticket" [ticket]="ticket"></app-ticket>
      } @empty {
        <p class="ticket-list__empty">No se han encontrado incidencias</p>
      }
    </div>

    <a
      class="open-ticket--phone"
      [class.new-ticket--hidden]="role === 'CLIENT'"
      routerLink="/ticket/create"
    >
      <div class="open-ticket__icon"></div>
    </a>
  </div>
}
