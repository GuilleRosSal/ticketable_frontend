<a class="ticket" [routerLink]="`/ticket/${ticket.ticket_id}`">
  <div class="ticket__main-data">
    <div class="ticket__details">
      <h2 class="ticket__subject">{{ ticket.subject }}</h2>
      <div class="ticket__state-container" [ngClass]="'ticket__state-container--' + ticket.state">
        @if (ticket.state === 'OPEN') {
          <svg class="ticket__state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="M19.5,24a1,1,0,0,1-.929-.628l-.844-2.113-2.116-.891a1.007,1.007,0,0,1,.035-1.857l2.088-.791.837-2.092a1.008,1.008,0,0,1,1.858,0l.841,2.1,2.1.841a1.007,1.007,0,0,1,0,1.858l-2.1.841-.841,2.1A1,1,0,0,1,19.5,24ZM10,21a2,2,0,0,1-1.936-1.413L6.45,14.54,1.387,12.846a2.032,2.032,0,0,1,.052-3.871L6.462,7.441,8.154,2.387A1.956,1.956,0,0,1,10.108,1a2,2,0,0,1,1.917,1.439l1.532,5.015,5.03,1.61a2.042,2.042,0,0,1,0,3.872h0l-5.039,1.612-1.612,5.039A2,2,0,0,1,10,21Zm.112-17.977L8.2,8.564a1,1,0,0,1-.656.64L2.023,10.888l5.541,1.917a1,1,0,0,1,.636.643l1.77,5.53,1.83-5.53a1,1,0,0,1,.648-.648l5.53-1.769a.072.072,0,0,0,.02-.009L12.448,9.2a1,1,0,0,1-.652-.661Zm8.17,8.96h0ZM20.5,7a1,1,0,0,1-.97-.757l-.357-1.43L17.74,4.428a1,1,0,0,1,.034-1.94l1.4-.325L19.53.757a1,1,0,0,1,1.94,0l.354,1.418,1.418.355a1,1,0,0,1,0,1.94l-1.418.355L21.47,6.243A1,1,0,0,1,20.5,7Z"
            />
          </svg>
        } @else if (ticket.state === 'IN_PROGRESS') {
          <svg class="ticket__state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="m12.823,8.883l-.294.235c-.315.251-.764.252-1.08.002l-.3-.237c-1.026-.812-1.732-1.684-2.099-2.592-.108-.268-.076-.572.085-.811.162-.239.431-.383.72-.383h2.132s2.131,0,2.131,0c.289,0,.559.144.72.383.161.239.193.543.085.811-.366.904-1.073,1.777-2.1,2.593Zm8.129,10.242c.186,1.236-.18,2.493-1.001,3.447-.834.968-2.043,1.523-3.319,1.523H7.368c-1.275,0-2.485-.556-3.318-1.523-.823-.956-1.188-2.213-1.002-3.452.382-2.542,1.704-4.899,3.936-7.025-2.232-2.125-3.554-4.482-3.936-7.025-.186-1.238.179-2.496,1.002-3.451C4.883.652,6.093.097,7.368.097h9.264c1.275,0,2.485.555,3.319,1.522.822.955,1.187,2.211,1.001,3.448-.379,2.535-1.702,4.894-3.94,7.029,2.238,2.136,3.562,4.494,3.94,7.03Zm-2.967.444c-.334-2.234-1.745-4.354-4.191-6.3-.358-.284-.566-.717-.566-1.174s.208-.89.566-1.174c2.447-1.946,3.857-4.065,4.191-6.299.076-.51-.16-.875-.308-1.046-.263-.306-.644-.481-1.045-.481H7.368c-.401,0-.782.176-1.045.481-.148.172-.385.537-.308,1.048.337,2.244,1.747,4.362,4.189,6.294.359.284.569.718.569,1.176s-.21.892-.569,1.176c-2.442,1.933-3.852,4.05-4.189,6.294-.077.512.16.876.309,1.048.263.306.644.481,1.045.481h9.264c.401,0,.782-.175,1.045-.48.148-.171.384-.536.308-1.045Z"
            />
          </svg>
        } @else {
          <svg class="ticket__state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path
              d="m16.298,8.288l1.404,1.425-5.793,5.707c-.387.387-.896.58-1.407.58s-1.025-.195-1.416-.585l-2.782-2.696,1.393-1.437,2.793,2.707,5.809-5.701Zm7.702,3.712c0,6.617-5.383,12-12,12S0,18.617,0,12,5.383,0,12,0s12,5.383,12,12Zm-2,0c0-5.514-4.486-10-10-10S2,6.486,2,12s4.486,10,10,10,10-4.486,10-10Z"
            />
          </svg>
        }
      </div>
    </div>
    <p class="ticket__category">{{ ticket.category.category }}</p>
  </div>
  <div class="ticket__secondary-data">
    <p class="ticket__id">ID: {{ ticket.ticket_id }}</p>
    <div class="ticket__last">
      <p class="ticket__user">{{ ticket.User.email }}</p>
      <p class="ticket__creation_date">{{ ticket.creation_date | date: 'dd/MM/yyyy' }}</p>
    </div>
  </div>
</a>
