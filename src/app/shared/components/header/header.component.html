<header class="header">
  <nav class="header__nav" aria-label="Menú de navegación principal">
    <ul class="header__list">
      <li class="header__item">
        <a class="header__link" routerLink="/ticket"
          ><img
            class="header__logo"
            src="images/Ticketable_logo.png"
            alt="Ticketable - Página de inicio"
        /></a>
      </li>
      <li class="header__item">
        <a class="header__link" [routerLink]="getProfileLink()" aria-label="Ir a mi perfil">
          <div
            class="header__icon"
            [style.mask-image]="'url(' + (iconPath$ | async) + ')'"
            [style.-webkit-mask-image]="'url(' + (iconPath$ | async) + ')'"
          ></div>
        </a>
      </li>
    </ul>
  </nav>
</header>
